<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISS Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
/* ─── RESET & BASE ─────────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',sans-serif;background:#0c101a;color:#e2e8f0;display:flex;flex-direction:column;font-size:14px}

/* ─── HEADER ───────────────────────────────────────────────────────────── */
#header{background:#111827;border-bottom:1px solid #1f2937;padding:0 20px;height:52px;display:flex;align-items:center;gap:16px;flex-shrink:0;z-index:100}
#header .logo{width:32px;height:32px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;flex-shrink:0}
#header h1{font-size:16px;font-weight:700;color:#f1f5f9;letter-spacing:-.3px}
#header .subtitle{font-size:11px;color:#6b7280;margin-top:1px}
.nav{display:flex;gap:4px;margin-left:32px}
.nav-btn{padding:8px 18px;border-radius:6px;border:none;background:transparent;color:#ffffff;cursor:pointer;transition:color .15s,background .15s;display:flex;align-items:center;gap:7px;font-family:inherit;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.nav-btn i{font-size:18px}
.nav-btn:hover{background:#1f2937;color:#ffffff}
.nav-btn.active{background:#1e3a5f;color:#fbbf24}
.season-select{margin-left:auto;padding:5px 10px;border:1px solid #374151;border-radius:6px;background:#1f2937;color:#e2e8f0;font-size:12px;cursor:pointer;font-family:inherit}
.season-select:focus{outline:none;border-color:#3b82f6}

/* ─── LAYOUT PRINCIPALE ────────────────────────────────────────────────── */
#main{display:flex;flex:1;overflow:hidden}
.sidebar{width:220px;background:#111827;border-right:1px solid #1f2937;overflow-y:auto;flex-shrink:0;padding:12px 0}
.content{flex:1;overflow-y:auto;padding:24px}
.page{display:none}.page.active{display:block}

/* ─── SIDEBAR ──────────────────────────────────────────────────────────── */
.sidebar-title{font-size:10px;font-weight:600;color:#4b5563;letter-spacing:.08em;text-transform:uppercase;padding:8px 16px 6px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;border-radius:0;transition:background .1s;border-left:3px solid transparent}
.sidebar-item:hover{background:#1f2937}
.sidebar-item.active{background:#1e3a5f;border-left-color:#3b82f6}
.sidebar-item .item-logo{width:28px;height:28px;object-fit:contain;border-radius:4px;flex-shrink:0}
.sidebar-item .item-logo-placeholder{width:28px;height:28px;background:#1f2937;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#6b7280;font-size:12px;flex-shrink:0}
.sidebar-item .item-name{font-size:13px;font-weight:500;color:#d1d5db;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-item .item-sub{font-size:10px;color:#6b7280}

/* ─── CARDS & GRIDS ─────────────────────────────────────────────────────── */
.card{background:#111827;border:1px solid #1f2937;border-radius:12px;padding:20px}
.card-sm{background:#111827;border:1px solid #1f2937;border-radius:10px;padding:14px 16px}
.grid{display:grid;gap:16px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:1fr 1fr 1fr}
.grid-4{grid-template-columns:repeat(4,1fr)}
.grid-auto{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}

/* ─── STATS SUMMARY ─────────────────────────────────────────────────────── */
.stat-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat-box{background:#111827;border:1px solid #1f2937;border-radius:10px;padding:14px 18px;flex:1;min-width:110px}
.stat-box .label{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.stat-box .value{font-size:22px;font-weight:700;color:#f1f5f9}
.stat-box .sub{font-size:11px;color:#4b5563;margin-top:2px}

/* ─── TABELLE ───────────────────────────────────────────────────────────── */
.table-wrap{background:#111827;border:1px solid #1f2937;border-radius:12px;overflow:hidden;margin-bottom:20px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:#0f172a;padding:10px 14px;text-align:left;font-size:10px;font-weight:600;color:#6b7280;letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid #1f2937;white-space:nowrap}
thead th.r,tbody td.r{text-align:right}
tbody td{padding:10px 14px;border-bottom:1px solid #1a2234;color:#cbd5e1;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#1a2234}
.rank{color:#4b5563;font-size:12px;min-width:28px}
.bold{font-weight:600;color:#f1f5f9}
.muted{color:#6b7280;font-size:12px}
.diff-pos{color:#34d399;font-weight:600}
.diff-neg{color:#f87171;font-weight:600}
.diff-zero{color:#9ca3af}

/* ─── PLAYER / TEAM ELEMENTS ────────────────────────────────────────────── */
.player-row{display:flex;align-items:center;gap:10px}
.player-photo{width:32px;height:32px;border-radius:50%;object-fit:cover;background:#1f2937;flex-shrink:0}
.player-photo-placeholder{width:32px;height:32px;border-radius:50%;background:#1f2937;display:flex;align-items:center;justify-content:center;color:#6b7280;font-size:14px;flex-shrink:0}
.team-logo{width:22px;height:22px;object-fit:contain;flex-shrink:0}
.team-logo-placeholder{width:22px;height:22px;background:#1f2937;border-radius:3px;flex-shrink:0}
.kit-dot{display:inline-block;width:12px;height:12px;border-radius:2px;vertical-align:middle;margin-right:6px;border:1px solid rgba(255,255,255,.15);flex-shrink:0}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600}
.badge-blue{background:#1e3a5f;color:#60a5fa}
.badge-green{background:#064e3b;color:#34d399}
.badge-red{background:#450a0a;color:#f87171}
.badge-gold{background:#451a03;color:#fbbf24}
.badge-gray{background:#1f2937;color:#9ca3af}
.role-badge{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;flex-shrink:0}
.role-POR{background:#1e3a5f;color:#60a5fa}
.role-DIF{background:#064e3b;color:#34d399}
.role-CEN{background:#4a1942;color:#c084fc}
.role-ATT{background:#450a0a;color:#f87171}

/* ─── MATCH CARD ─────────────────────────────────────────────────────────── */
.match-card{background:#111827;border:1px solid #1f2937;border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.match-team{display:flex;align-items:center;gap:8px;flex:1}
.match-team.away{flex-direction:row-reverse}
.match-team .tname{font-weight:500;color:#e2e8f0;font-size:13px}
.match-score{font-size:20px;font-weight:700;color:#f1f5f9;min-width:70px;text-align:center}
.match-score .sep{color:#374151;margin:0 4px}
.match-meta{font-size:10px;color:#6b7280;text-align:center;min-width:70px}
.match-winner td{color:#fbbf24!important}

/* ─── BRACKET ────────────────────────────────────────────────────────────── */
.bracket{display:flex;gap:0;overflow-x:auto;padding-bottom:12px}
.bracket-round{min-width:220px;padding:0 16px;display:flex;flex-direction:column;justify-content:flex-start;gap:8px}
.bracket-round-title{display:none}
.bracket-match{background:#111827;border:1px solid #1f2937;border-radius:8px;overflow:hidden;margin:0}
.bracket-team{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid #1a2234}
.bracket-team:last-child{border-bottom:none}
.bracket-team.winner{background:#1e3a5f}
.bracket-team .bname{font-size:12px;font-weight:500;color:#d1d5db;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bracket-team .bscore{font-size:14px;font-weight:700;color:#f1f5f9;min-width:20px;text-align:right}
.bracket-team.winner .bname{color:#60a5fa}
.bracket-team.winner .bscore{color:#fbbf24}

/* ─── CAMPO DA CALCIO ────────────────────────────────────────────────────── */
.field{background:linear-gradient(180deg,#064e3b 0%,#065f46 50%,#064e3b 100%);border-radius:10px;position:relative;overflow:hidden;aspect-ratio:2/3;max-width:360px;margin:0 auto}
.field-line{position:absolute;background:rgba(255,255,255,.2)}
.field-player{position:absolute;transform:translate(-50%,-50%);text-align:center;cursor:pointer;z-index:10}
.field-player:hover .fp-card{transform:scale(1.05)}
.fp-photo{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.4);background:#1f2937;display:block;margin:0 auto}
.fp-name{font-size:9px;font-weight:600;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.8);margin-top:3px;white-space:nowrap;max-width:60px;overflow:hidden;text-overflow:ellipsis;background:rgba(0,0,0,.5);border-radius:3px;padding:1px 3px}

/* ─── SEZIONE TITOLI ─────────────────────────────────────────────────────── */
.section-hdr{display:flex;align-items:center;gap:10px;margin-bottom:16px;margin-top:4px}
.section-hdr h2{font-size:14px;font-weight:600;color:#f1f5f9}
.section-hdr .count{font-size:12px;color:#6b7280;background:#1f2937;padding:2px 8px;border-radius:20px}
.divider{height:1px;background:#1f2937;margin:20px 0}

/* ─── TROPHY CARDS ───────────────────────────────────────────────────────── */
.trophy-card{background:#111827;border:1px solid #1f2937;border-radius:10px;padding:14px;display:flex;align-items:center;gap:12px}
.trophy-icon{width:40px;height:40px;object-fit:contain;flex-shrink:0}
.trophy-icon-placeholder{width:40px;height:40px;background:#1f2937;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fbbf24;font-size:18px;flex-shrink:0}

/* ─── FILTRI ─────────────────────────────────────────────────────────────── */
.filter-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-input{padding:7px 12px;border:1px solid #374151;border-radius:8px;background:#1f2937;color:#e2e8f0;font-size:13px;font-family:inherit;outline:none;flex:1;min-width:160px}
.filter-input:focus{border-color:#3b82f6}
.filter-select{padding:7px 12px;border:1px solid #374151;border-radius:8px;background:#1f2937;color:#e2e8f0;font-size:13px;font-family:inherit;cursor:pointer;outline:none}
.filter-select:focus{border-color:#3b82f6}

/* ─── AWARD CARDS ────────────────────────────────────────────────────────── */
.award-card{background:#111827;border:1px solid #1f2937;border-radius:12px;padding:20px;text-align:center}
.award-card .award-icon{width:48px;height:48px;object-fit:contain;margin:0 auto 12px;display:block}
.award-card .award-photo{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid #374151;margin:0 auto 10px;display:block;background:#1f2937}
.award-card .award-label{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.award-card .award-name{font-size:15px;font-weight:700;color:#f1f5f9;margin-bottom:2px}
.award-card .award-team{font-size:12px;color:#9ca3af}
.award-card .award-val{font-size:13px;font-weight:600;color:#fbbf24;margin-top:6px}

/* ─── LOADING & EMPTY ────────────────────────────────────────────────────── */
.loading{display:flex;align-items:center;gap:10px;color:#6b7280;padding:40px;justify-content:center}
.loading i{font-size:20px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{color:#4b5563;padding:40px;text-align:center;font-size:13px}
.empty i{font-size:32px;display:block;margin-bottom:8px;color:#374151}

/* ─── SCROLLBAR ──────────────────────────────────────────────────────────── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#0c101a}
::-webkit-scrollbar-thumb{background:#374151;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#4b5563}

/* ─── RESPONSIVE ─────────────────────────────────────────────────────────── */
@media(max-width:768px){
  .sidebar{display:none}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
  .stat-row{gap:8px}
}
</style>
</head>

<script>
// ─── UTILS ──────────────────────────────────────────────────────────────────
const imgUrl = p => p ? `/api/image?path=${encodeURIComponent(p)}` : null;

function imgTag(path, cls='', style='', fallbackIcon='ti-photo') {
  if (!path) return `<span class="${cls}" style="${style};display:inline-flex;align-items:center;justify-content:center;background:#1f2937;border-radius:4px"><i class="ti ${fallbackIcon}" style="font-size:14px;color:#4b5563"></i></span>`;
  return `<img src="${imgUrl(path)}" class="${cls}" style="${style}" onerror="this.outerHTML=this.nextSibling.outerHTML" loading="lazy">`;
}

function playerPhoto(path, size=32) {
  const s = `width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;background:#1f2937;flex-shrink:0`;
  return imgTag(path, '', s, 'ti-user');
}

function teamLogo(path, size=22) {
  const s = `width:${size}px;height:${size}px;object-fit:contain;flex-shrink:0`;
  return imgTag(path, '', s, 'ti-shield');
}

function roleLabel(r) {
  const map = {POR:'POR',DIF:'DIF',CEN:'CEN',ATT:'ATT'};
  return `<span class="role-badge role-${r||'ATT'}">${map[r]||r||'—'}</span>`;
}

function fmt(n) { return n != null ? n.toLocaleString('it-IT') : '—'; }
function fmtR(r) { return r > 0 ? r.toFixed(2) : '—'; }

async function api(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`API ${url} -> ${r.status}`);
  return r.json();
}

function loading(id) {
  document.getElementById(id).innerHTML = '<div class="loading"><i class="ti ti-loader"></i> Caricamento...</div>';
}
function empty(id, msg='Nessun dato', icon='ti-info-circle') {

// ─── INIT ────────────────────────────────────────────────────────────────────
async function init() {
  // Carica stagioni
  const seasons = await api('/api/seasons');
  const gSel = document.getElementById('global-season');
  const psSel = document.getElementById('ps-season');
  const ssSel = document.getElementById('ss-season');
  seasons.forEach(s => {
    // s = { name, isConcluded }
    [gSel, psSel].forEach(sel => { const o = new Option(s.name, s.name); sel.appendChild(o.cloneNode(true)); });
    const o2 = new Option(s.name, s.name); ssSel.appendChild(o2);
  });
  // Pre-seleziona l'ultima stagione conclusa nella tab Stagione
  const lastConcluded = seasons.find(s => s.isConcluded);
  if (lastConcluded) {
    ssSel.value = lastConcluded.name;
    loadSeasonStats(lastConcluded.name);
  }

  // Carica leghe
  state.leagues = await api('/api/leagues');
  // Carica tornei
  state.tournaments = await api('/api/tournaments');

  switchTab('leagues', document.querySelector('.nav-btn[data-page="leagues"]'));
}

// ─── TAB SWITCHING ───────────────────────────────────────────────────────────
function switchTab(tab, btn) {
  state.tab = tab;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  buildSidebar(tab);
  if (tab === 'ranking') loadRanking();
  if (tab === 'playerstats') loadPlayerStats();
  // Auto-seleziona primo elemento della sidebar
  if (tab === 'leagues' && state.leagues.length) {
    setTimeout(() => selectLeague(state.leagues[0].id, 'leagues'), 0);
  }
  if (tab === 'trophies') {
    // Prima voce = MERDA
    setTimeout(() => loadMerdaTrophies(), 0);
  }
  if (tab === 'playertrophies') {
    // Prima voce = MERDA
    setTimeout(() => loadPlayerTrophiesMerda(), 0);
  }
  if (tab === 'competitions' && state.tournaments.length) {
    // Prima competizione della stagione più recente
    const sorted = [...state.tournaments].sort((a,b) => b.season.localeCompare(a.season));
    if (sorted.length) setTimeout(() => selectTournament(sorted[0].id), 0);
  }
}

function onGlobalSeasonChange() {
  state.season = document.getElementById('global-season').value;
  if (state.tab === 'ranking') loadRanking();
}

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────
function buildSidebar(tab) {
  const sb = document.getElementById('sidebar');
  if (tab === 'leagues' || tab === 'trophies' || tab === 'playertrophies') {
    const merdaItem = (tab === 'trophies' || tab === 'playertrophies') ? `
      <div class="sidebar-item" id="si-merda" onclick="onMerdaSidebarClick()">
        <div class="item-logo-placeholder" style="background:linear-gradient(135deg,#7f1d1d,#991b1b);border-radius:6px;font-size:14px;display:flex;align-items:center;justify-content:center">💩</div>
        <div><div class="item-name">MERDA</div><div class="item-sub">Competizioni Merda</div></div>
      </div>` : '';
    sb.innerHTML = '<div class="sidebar-title">Leghe</div>' + merdaItem +
      state.leagues.map(l => `
        <div class="sidebar-item" id="si-${l.id}" onclick="${tab==='playertrophies' ? `loadPlayerTrophiesLeague('${l.id}')` : `selectLeague('${l.id}','${tab}')`}">
          ${l.logoPath ? `<img src="${imgUrl(l.logoPath)}" class="item-logo" onerror="this.style.display='none'">` : `<div class="item-logo-placeholder"><i class="ti ti-shield"></i></div>`}
          <div><div class="item-name">${l.name}</div><div class="item-sub">${l.nationName}</div></div>
        </div>`).join('');
  } else if (tab === 'competitions') {
    buildCompSidebar();
  } else {
    sb.innerHTML = '';
  }
}

// ─── LEGHE ───────────────────────────────────────────────────────────────────
async function selectLeague(id, tab) {
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  const si = document.getElementById('si-' + id);
  if (si) si.classList.add('active');

  if (tab === 'trophies') { loadLeagueTrophies(id); return; }
  loading('league-detail');
  const [overview, teams] = await Promise.all([
    api(`/api/leagues/${id}/overview`),
    api(`/api/leagues/${id}/teams`)
  ]);
  renderLeagueDetail(overview, teams, id);
}

function renderLeagueDetail(data, teams, leagueId) {
  const {league, xi, topScorers, trophies} = data;
  const el = document.getElementById('league-detail');

  // Sub-tabs lega
  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
      ${league.logoPath ? `<img src="${imgUrl(league.logoPath)}" style="width:56px;height:56px;object-fit:contain">` : ''}
      <div>
        <h2 style="font-size:20px;font-weight:700;color:#f1f5f9">${league.name}</h2>
        <div style="font-size:13px;color:#9ca3af">${league.nationName} · ${league.continent}</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:20px" id="league-subtabs">
      <button class="filter-select" style="cursor:pointer;padding:6px 14px;border-radius:8px;background:#1d4ed8;border-color:#1d4ed8;color:#fff;font-weight:500" onclick="showLeagueTab('teams','${leagueId}')">Squadre</button>
      <button class="filter-select" style="cursor:pointer;padding:6px 14px;border-radius:8px" onclick="showLeagueTab('overview','${leagueId}')">Panoramica</button>

    <div id="league-tab-content"></div>`;

}

function showLeagueTab(tab, leagueId) {
  document.querySelectorAll('#league-subtabs button').forEach((b,i) => {
    const active = (i===0&&tab==='teams')||(i===1&&tab==='overview'); b.style.background = active ? '#1d4ed8' : '#1f2937';
    b.style.borderColor = active ? '#1d4ed8' : '#374151';
    b.style.color = active ? '#fff' : '#9ca3af';
    b.style.fontWeight = active ? '500' : '400';
  });
  if (tab === 'overview') {
    api(`/api/leagues/${leagueId}/overview`).then(data =>
      api(`/api/leagues/${leagueId}/teams`).then(teams => renderLeagueOverview(data, teams, leagueId)));
  } else if (tab === 'teams') {
    api(`/api/leagues/${leagueId}/teams`).then(teams => renderLeagueTeams(teams, leagueId));
  } else if (tab === 'stats') {
    api(`/api/leagues/${leagueId}/overview`).then(data => renderLeagueStats(data));
  }
}

function renderLeagueOverview(data, teams, leagueId) {
  const {xi, topScorers, trophies} = data;
  const el = document.getElementById('league-tab-content');
  loading('league-tab-content');

  Promise.all([
    api(`/api/leagues/${leagueId}/bestplayers`).catch(()=>[]),
    api(`/api/leagues/${leagueId}/leaguestats`).catch(()=>[]),
    api(`/api/leagues/${leagueId}/individualtrophies`).catch(()=>[])
  ]).then(([bestPlayers, sections, indTrophies]) => {
    const bestHtml = renderBestPlayerSection(bestPlayers || []);

    // Premi individuali per competizione — usa winnersBySeason (nuovo formato)
    const indHtml = (indTrophies||[]).map(tourn => {
      const cats = tourn.categories.map(cat => {
        const seasons = cat.winnersBySeason || [];
        if (!seasons.length) return '';
        const rows = seasons.map(s => {
          const playerImgs = (s.players||[]).map(w => `
            <div style="display:flex;align-items:center;gap:6px;cursor:pointer" onclick="openPlayer('${w.playerId}')">
              ${w.photoPath ? `<img src="${imgUrl(w.photoPath)}" style="width:24px;height:24px;border-radius:50%;object-fit:cover;object-position:top;flex-shrink:0;border:1px solid ${cat.color}">` : ''}
              <span style="font-size:11px;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px">${w.playerName}</span>
            </div>`).join('');
          return `
            <div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-top:1px solid #1a2234">
              <span style="font-size:9px;font-weight:700;color:#fbbf24;min-width:28px;flex-shrink:0">${s.season}</span>
              <div style="display:flex;flex-wrap:wrap;gap:6px">${playerImgs}</div>
            </div>`;
        }).join('');
        return `
          <div style="background:#0f172a;border:1px solid #1f2937;border-radius:8px;overflow:hidden;flex:1;min-width:160px">
            <div style="background:#0a0f1a;padding:6px 10px;display:flex;align-items:center;gap:6px">
              ${cat.iconPath ? `<img src="${imgUrl(cat.iconPath)}" style="width:20px;height:20px;object-fit:contain">` : ''}
              <span style="font-size:9px;font-weight:700;color:${cat.color};text-transform:uppercase;letter-spacing:.06em">${cat.label}</span>
            </div>
            <div style="padding:6px 10px">${rows}</div>
          </div>`;
      }).join('');
      return `
        <div style="margin-bottom:16px">
          <div style="font-size:10px;font-weight:700;color:#6b7280;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px">${tourn.groupName}</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">${cats}</div>
        </div>`;
    }).join('');

    const statsHtml = (sections||[]).map(s => renderLeagueStatsSection(s)).join('');

    el.innerHTML = `
      ${bestHtml}
      ${indHtml ? `
        <div style="margin-bottom:28px">
          <div style="font-size:12px;font-weight:700;color:#fbbf24;letter-spacing:.1em;text-transform:uppercase;text-align:center;margin-bottom:16px;padding:6px;border-bottom:1px solid #1f2937">🏅 PREMI INDIVIDUALI 🏅</div>
          ${indHtml}
        </div>` : ''}
      ${statsHtml}`;
  });
}

function renderLeagueXI(xi) {
  if (!xi || xi.length === 0) return '<div class="empty"><i class="ti ti-run"></i>Dati insufficienti</div>';
  const positions = ['GK','DEF','MID','FWD'];
  const rowPositions = { GK: 86, DEF: 63, MID: 38, FWD: 14 };
  const byPos = {};
  positions.forEach(p => byPos[p] = xi.filter(x => x.position === p));
  const rowHtml = (pos) => {
    const players = byPos[pos] || [];
    if (!players.length) return '';
    const topPct = rowPositions[pos];
    return `
      <div style="position:absolute;left:0;right:0;top:${topPct}%;transform:translateY(-50%);display:flex;justify-content:space-evenly;align-items:flex-start;padding:0 6px">
        ${players.map(p => `
          <div style="text-align:center;cursor:pointer;width:56px" onclick="openPlayer('${p.playerId}')">
            <img src="${imgUrl(p.photoPath)}" style="width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.4);background:#1f2937;display:block;margin:0 auto 3px;box-shadow:0 2px 6px rgba(0,0,0,.7)" onerror="this.src=''">
            <div style="font-size:8px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.9);background:rgba(0,0,0,.6);border-radius:3px;padding:1px 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:56px">${p.playerName}</div>
            <div style="font-size:7px;color:rgba(255,255,255,.8)">${fmtR(p.avgRating)}</div>
          </div>`).join('')}
      </div>`;
  };
  return `
    <div style="border-radius:10px;overflow:hidden;position:relative;height:400px">
      <img src="${FIELD_IMG}" style="width:100%;height:100%;object-fit:fill;position:absolute;inset:0">
      <div style="position:absolute;inset:0">
        ${positions.map(p => rowHtml(p)).join('')}
      </div>
    </div>`;
}

function renderFieldXI(xi) {
  if (!xi || xi.length === 0) return '<div class="empty"><i class="ti ti-run"></i>Dati insufficienti</div>';
  const roles = ['POR','DIF','CEN','ATT'];
  const byRole = {};
  roles.forEach(r => byRole[r] = xi.filter(p => p.role === r || (!byRole['ATT'] && !roles.includes(p.role))));
  
  // Layout semplice a griglia per ruolo
  return `<div style="display:flex;flex-wrap:wrap;gap:16px;margin-bottom:20px">` +
    xi.slice(0,11).map(p => `
      <div class="card-sm" style="min-width:160px;cursor:pointer;flex:1" onclick="openPlayer('${p.playerId}')">
        <div style="display:flex;align-items:center;gap:10px">
          ${playerPhoto(p.photoPath, 40)}

              ${roleLabel(p.role)}

}

// ─── TEAM DETAIL ─────────────────────────────────────────────────────────────
async function openTeam(teamId, leagueId) {
  loading('league-tab-content');
  const [teamData, players, stats, palmares] = await Promise.all([
    api(`/api/teams/${teamId}`),
    api(`/api/teams/${teamId}/players`),
    api(`/api/teams/${teamId}/stats`),
    api(`/api/teams/${teamId}/palmares`)
  ]);
  const {team, league, formation} = teamData;
  const el = document.getElementById('league-tab-content');

  const roleOrder = {POR:0,PT:0,GK:0, DIF:1,DC:1,TS:1,TD:1,LIB:1, CEN:2,CC:2,CLS:2,CLD:2,MED:2,TRQ:2, ATT:3};
  const sorted = [...players].sort((a,b) => {
    const ra = roleOrder[a.role?.toUpperCase()] ?? 3;
    const rb = roleOrder[b.role?.toUpperCase()] ?? 3;
    return ra !== rb ? ra - rb : (a.number||99) - (b.number||99);
  });

  el.innerHTML = `
    <button onclick="showLeagueTab('teams','${leagueId}')" style="background:none;border:none;color:#6b7280;font-size:13px;cursor:pointer;margin-bottom:16px;display:flex;align-items:center;gap:6px;font-family:inherit">

    <div style="display:flex;align-items:center;gap:20px;margin-bottom:24px;flex-wrap:wrap">
      ${team.logoPath ? `<img src="${imgUrl(team.logoPath)}" style="width:72px;height:72px;object-fit:contain">` : ''}
      <div style="flex:1">
        <h2 style="font-size:22px;font-weight:700;color:#f1f5f9">${team.name}</h2>
        <div style="font-size:13px;color:#9ca3af;margin-top:2px">${league?.name || ''}</div>
        <div style="display:flex;gap:6px;margin-top:8px;align-items:center">
          <span style="font-size:11px;color:#6b7280">Casa:</span>
          <span class="kit-dot" style="background:${team.homeKit.primaryColor}"></span>
          <span class="kit-dot" style="background:${team.homeKit.secondaryColor}"></span>
          <span style="font-size:11px;color:#4b5563;margin-right:12px">${team.homeKit.style}</span>
          <span style="font-size:11px;color:#6b7280">Trasferta:</span>
          <span class="kit-dot" style="background:${team.awayKit.primaryColor}"></span>
          <span class="kit-dot" style="background:${team.awayKit.secondaryColor}"></span>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0">
        <div class="stat-box" style="display:flex;justify-content:space-between;align-items:center;gap:24px;padding:8px 14px;white-space:nowrap"><div class="label">Punti</div><div class="value" style="font-size:16px">${stats.points}</div></div>
        <div class="stat-box" style="display:flex;justify-content:space-between;align-items:center;gap:24px;padding:8px 14px;white-space:nowrap"><div class="label">V-P-S</div><div class="value" style="font-size:16px">${stats.won}-${stats.drawn}-${stats.lost}</div></div>
        <div class="stat-box" style="display:flex;justify-content:space-between;align-items:center;gap:24px;padding:8px 14px;white-space:nowrap"><div class="label">GF-GS</div><div class="value" style="font-size:16px">${stats.goalsFor}-${stats.goalsAgainst}</div></div>
        <div class="stat-box" style="display:flex;justify-content:space-between;align-items:center;gap:24px;padding:8px 14px;white-space:nowrap"><div class="label">Trofei</div><div class="value" style="font-size:16px">${palmares.length}</div></div>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:20px" id="team-subtabs">
      ${['Team','Statistiche','Palmares'].map((l,i) => `
        <button class="filter-select" style="cursor:pointer;padding:6px 14px;border-radius:8px;${i===0?'background:#1d4ed8;border-color:#1d4ed8;color:#fff;font-weight:500':''}"
          onclick="switchTeamTab(${i},'${teamId}')">${l}</button>`).join('')}

            Formazione ${formation ? `<span style="color:#fbbf24">${formation.module}</span>` : '<span style="color:#374151">non impostata</span>'}

              <div style="font-weight:600;font-size:13px;color:#f1f5f9">${t.tournamentName}</div>

function switchTeamTab(idx, teamId) {
  [0,1,2].forEach(i => {
    const el = document.getElementById('team-tab-' + i);
    if (el) el.style.display = i === idx ? 'block' : 'none';
  });
  document.querySelectorAll('#team-subtabs button').forEach((b,i) => {
    b.style.background  = i === idx ? '#1d4ed8' : '#1f2937';
    b.style.borderColor = i === idx ? '#1d4ed8' : '#374151';
    b.style.color       = i === idx ? '#fff'    : '#9ca3af';
    b.style.fontWeight  = i === idx ? '500'     : '400';
  });
  // Carica statistiche al primo click
  if (idx === 1 && teamId) {
    const el = document.getElementById('team-stats-content');
    if (el && el.querySelector('.loading')) loadTeamLeagueStats(teamId);
  }
}

async function loadTeamLeagueStats(teamId) {
  const el = document.getElementById('team-stats-content');
  el.innerHTML = '<div class="loading"><i class="ti ti-loader" style="animation:spin 1s linear infinite"></i> Caricamento...</div>';
  const [sections, bestPlayers] = await Promise.all([
    api(`/api/teams/${teamId}/leaguestats`),
    api(`/api/teams/${teamId}/bestplayers`).catch(()=>[])
  ]);
  if (!sections || sections.length === 0) {
    el.innerHTML = '<div class="empty"><i class="ti ti-chart-bar"></i>Nessuna statistica disponibile</div>';
    return;
  }
  el.innerHTML = renderBestPlayerSection(bestPlayers||[]) + sections.map(s => renderLeagueStatsSection(s)).join('');
}

function renderBestPlayerSection(bestPlayers) {

            ${item.leagueLogo ? `<div style="position:absolute;left:5px;top:92px;width:21px;height:21px;border-radius:50%;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden"><img src="${imgUrl(item.leagueLogo)}" style="width:17px;height:17px;object-fit:contain"></div>` : ''}
            ${item.teamLogo ? `<div style="position:absolute;left:34px;top:87px;width:23px;height:23px;border-radius:50%;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden"><img src="${imgUrl(item.teamLogo)}" style="width:19px;height:19px;object-fit:contain"></div>` : ''}

        </div>

function renderFormationField(formation, team, allPlayers) {
  const primary   = team?.homeKit?.primaryColor   || '#1a2a4a';
  const secondary = team?.homeKit?.secondaryColor || '#ffffff';
  const positions = ['GK','DEF','MID','FWD'];
  let fieldInner = '';
  let benchPlayers = [];

  if (formation && formation.slots && formation.slots.length > 0) {
    const inFieldIds = new Set(formation.slots.filter(s=>s.playerId).map(s=>s.playerId));
    benchPlayers = (allPlayers||[]).filter(p => !inFieldIds.has(p.id));

    fieldInner = positions.map((pos, rowIdx) => {
      const slots = formation.slots.filter(s => s.position === pos).sort((a,b) => a.index - b.index);
      if (!slots.length) return '';
      const topPct = 90 - (rowIdx / (positions.length - 1)) * 76;
      return `
        <div style="position:absolute;left:0;right:0;top:${topPct}%;transform:translateY(-50%);display:flex;justify-content:space-evenly;align-items:center;padding:0 8px">
          ${slots.map(s => `
            <div style="display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer" ${s.playerId ? `onclick="openPlayer('${s.playerId}')"` : ''}>
              <div style="width:52px;height:52px;border-radius:50%;background:${s.photoPath ? 'transparent' : primary};border:3px solid ${secondary};overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.6)">
                ${s.photoPath ? `<img src="${imgUrl(s.photoPath)}" style="width:100%;height:100%;object-fit:cover;object-position:top">` : `<span style="font-size:8px;color:#fff;font-weight:700">${pos}</span>`}
              </div>
              <div style="font-size:9px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.9);background:rgba(0,0,0,.6);border-radius:3px;padding:1px 4px;white-space:nowrap;max-width:64px;overflow:hidden;text-overflow:ellipsis;text-align:center">
                ${s.playerName || '—'}
              </div>
            </div>`).join('')}
        </div>`;
    }).join('');
  } else {
    benchPlayers = allPlayers || [];
    fieldInner = '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.3);font-size:12px;flex-direction:column;gap:8px"><i class="ti ti-layout-distribute-vertical" style="font-size:28px"></i>Nessuna formazione</div>';
  }

  const bench = benchPlayers.length ? `
    <div style="margin-top:10px">
      <div style="font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;text-align:center">Panchina</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center">
        ${benchPlayers.map(p => `
          <div style="display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer" onclick="openPlayer('${p.id}')">
            <div style="width:38px;height:38px;border-radius:50%;background:${primary};border:2px solid ${secondary};overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.5)">
              ${p.photoPath ? `<img src="${imgUrl(p.photoPath)}" style="width:100%;height:100%;object-fit:cover;object-position:top">` : ''}
            </div>
            <div style="font-size:8px;color:#9ca3af;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:48px;text-align:center">${p.name}</div>
          </div>`).join('')}
      </div>
    </div>` : '';

  return `
    <div>
      <div style="border-radius:10px;height:500px;position:relative;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.5)">
        <img src="${FIELD_IMG}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:fill">
        <div style="position:absolute;inset:0">${fieldInner}</div>
      </div>
      ${bench}
    </div>`;
}

                <td style="padding:5px 8px"><div style="display:flex;align-items:center;gap:5px">
                  ${r.photoPath ? `<img src="${imgUrl(r.photoPath)}" style="width:20px;height:20px;border-radius:50%;object-fit:cover;background:#1f2937;flex-shrink:0">` : ''}

            ${ranking.rows.slice(0,10).map(r => `

// ─── PLAYER DETAIL ────────────────────────────────────────────────────────────
async function openPlayer(playerId) {
  // Naviga alla tab player stats e mostra dettaglio
  const data = await api(`/api/players/${playerId}`);
  showPlayerDetail(data);
}

function showPlayerDetail(data) {
  const {player, team, leagueName, totalGoals, totalAssists, totalMvp, totalMatches, avgRating, totalScore, totalCleanSheets, seasonStats, personalTrophies, teamTrophies, seasonAwards} = data;

  let overlay = document.getElementById('player-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'player-overlay';
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px';
    overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
    document.body.appendChild(overlay);
  }

  // Recupera cartellini totali dalle righe stagione (non subtotali)
  const totalYellow = (seasonStats||[]).filter(s=>!s.isSubtotal).reduce((a,s)=>a+(s.yellowCards||0),0);
  const totalRed    = (seasonStats||[]).filter(s=>!s.isSubtotal).reduce((a,s)=>a+(s.redCards||0),0);

  const trophyCard = (iconPath, label, entries) => {
    const count = entries.length;
    const isNazliga = label.toLowerCase().includes('nazliga');
    const labelColor = isNazliga ? '#94a3b8' : '#f1f5f9';
    const countColor = isNazliga ? '#94a3b8' : '#fbbf24';
    const iconFilter = isNazliga ? 'filter:grayscale(1) brightness(1.4)' : '';
    return `
    <div class="trophy-card" style="align-items:flex-start;gap:10px${isNazliga ? ';opacity:0.85' : ''}">
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
        ${count > 1 ? `<span style="font-size:14px;font-weight:700;color:${countColor};min-width:16px">${count}</span>` : '<span style="min-width:22px"></span>'}
        ${iconPath
          ? `<img src="${imgUrl(iconPath)}" class="trophy-icon" style="${iconFilter}">`
          : `<div class="trophy-icon-placeholder"><i class="ti ti-trophy"></i></div>`}
      </div>
      <div>
        <div style="font-weight:600;font-size:13px;color:${labelColor}">${label}</div>
        ${entries.map(e => `<div style="font-size:11px;color:#6b7280">${e.name ? e.name+' · ' : ''}${e.season}</div>`).join('')}
      </div>
    </div>`;
  };

  // Raggruppa trofei per label+iconPath
  const groupTrophies = (list) => {
    const map = new Map();
    list.forEach(t => {
      const key = (t.label||t.title||'') + '|' + (t.iconPath||'');
      if (!map.has(key)) map.set(key, { iconPath: t.iconPath, label: t.label||t.title||'Vincitore', entries: [] });
      map.get(key).entries.push({ name: t.name||t.tournamentName||'', season: t.season });
    });
    return [...map.values()];
  };

  const teamTrophySection = teamTrophies.length ? `
    <div class="section-hdr" style="margin-top:16px"><h2>🏆 Trophy</h2><span class="count">${teamTrophies.length}</span></div>
    <div style="display:flex;flex-direction:column;gap:6px">
      ${groupTrophies(teamTrophies.sort((a,b)=>a.season.localeCompare(b.season)).map(t=>({
          iconPath:t.iconPath, label:t.title||'Vincitore',
          name:`${t.tournamentName}${t.teamName?' ('+t.teamName+')':''}`, season:t.season
        }))).map(g => trophyCard(g.iconPath, g.label, g.entries)).join('')}
    </div>` : '';

  const personalList = [
    ...personalTrophies.map(t => ({iconPath:t.iconPath, label:t.label||t.category, name:t.tournamentName, season:t.season})),
    ...(seasonAwards||[]).map(a => ({iconPath:a.iconPath, label:a.label, name:'', season:a.season}))
  ].sort((a,b) => a.season.localeCompare(b.season));

  const personalTrophySection = personalList.length ? `
    <div class="section-hdr" style="margin-top:16px"><h2>⭐ Personal Trophy</h2><span class="count">${personalList.length}</span></div>
    <div style="display:flex;flex-direction:column;gap:6px">
      ${groupTrophies(personalList).map(g => trophyCard(g.iconPath, g.label, g.entries)).join('')}
    </div>` : '';

  overlay.innerHTML = `
    <div style="background:#111827;border:1px solid #1f2937;border-radius:16px;max-width:960px;width:100%;max-height:88vh;overflow-y:auto;padding:28px;position:relative">
      <button onclick="document.getElementById('player-overlay').remove()" style="position:absolute;top:16px;right:16px;background:#1f2937;border:none;color:#9ca3af;width:32px;height:32px;border-radius:6px;cursor:pointer;font-size:16px">✕</button>

      <!-- Header -->
      <div style="display:flex;align-items:center;gap:20px;margin-bottom:20px">
        ${playerPhoto(player.photoPath, 80)}
        <div style="flex:1">
          <h2 style="font-size:22px;font-weight:700;color:#f1f5f9">${player.name}</h2>
          <div style="display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap">
            ${roleLabel(player.role)}
            ${team ? teamLogo(team.logoPath, 20) : ''}
            <span style="font-size:13px;color:#9ca3af">${team?.name || ''}</span>
            <span class="badge badge-gray">${leagueName}</span>
          </div>
          ${player.nationName ? `<div style="font-size:12px;color:#6b7280;margin-top:4px">${player.nationName}</div>` : ''}
        </div>
      </div>

      <!-- Stats sommario -->
      <div class="stat-row" style="flex-wrap:wrap;gap:8px">
        <div class="stat-box"><div class="label">Gol</div><div class="value">${totalGoals}</div></div>

function buildCompSidebar() {
  const sb = document.getElementById('sidebar');
  const grouped = {};
  state.tournaments.forEach(t => {
    if (!grouped[t.season]) grouped[t.season] = [];
    grouped[t.season].push(t);
  });
  const seasons = Object.keys(grouped).sort().reverse();
  sb.innerHTML = seasons.map(s => `
    <div class="sidebar-title">${s}</div>
    ${grouped[s].map(t => `
      <div class="sidebar-item" id="si-${t.id}" onclick="selectTournament('${t.id}')">
        ${t.logo ? `<img src="${imgUrl(t.logo)}" class="item-logo" onerror="this.style.display='none'">` : `<div class="item-logo-placeholder"><i class="ti ti-tournament"></i></div>`}
        <div><div class="item-name">${t.name}</div><div class="item-sub">${typeLabel(t.type)}</div></div>
      </div>`).join('')}
  `).join('');
}

function typeLabel(t) {
  const map = {league:'Campionato',league_limited:'Campionato',knockout:'Coppa',groups_ko:'Gironi + KO'};
  return map[t] || t;
}

async function selectTournament(id) {
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  const si = document.getElementById('si-' + id);
  if (si) si.classList.add('active');
  loading('comp-detail');

  const tourn = state.tournaments.find(t => t.id === id);
  if (!tourn) return;

  if (tourn.type === 'knockout') {
    const [bracket, scorers, detail, matches] = await Promise.all([
      api(`/api/tournaments/${id}/bracket`),
      api(`/api/tournaments/${id}/scorers`),
      api(`/api/tournaments/${id}`),
      api(`/api/tournaments/${id}/matches`)
    ]);
    renderKOTournament(tourn, bracket, scorers, detail, matches);
  } else if (tourn.type === 'groups_ko') {
    const [groups, bracket, scorers, matches] = await Promise.all([
      api(`/api/tournaments/${id}/groups`),
      api(`/api/tournaments/${id}/bracket`),
      api(`/api/tournaments/${id}/scorers`),
      api(`/api/tournaments/${id}/matches`)
    ]);
    renderGroupsKO(tourn, groups, bracket, scorers, matches);
  } else {
    const [standings, scorers, matches] = await Promise.all([
      api(`/api/tournaments/${id}/standings`),
      api(`/api/tournaments/${id}/scorers`),
      api(`/api/tournaments/${id}/matches`)
    ]);
    renderLeagueTournament(tourn, standings, scorers, matches);
  }
}

function switchCompTab(idx) {
  for (let i = 0; i < 10; i++) {
    const el = document.getElementById('comp-tab-' + i);
    if (!el) break;
    el.style.display = i === idx ? 'block' : 'none';
  }
  document.querySelectorAll('#comp-subtabs button').forEach((b, i) => {
    b.style.background = i === idx ? '#1d4ed8' : '#1f2937';
    b.style.borderColor = i === idx ? '#1d4ed8' : '#374151';
    b.style.color = i === idx ? '#fff' : '#9ca3af';
    b.style.fontWeight = i === idx ? '500' : '400';
  });
}

function renderTournamentStats(scorers) {
  if (!scorers || !scorers.length) return '<div class="empty"><i class="ti ti-chart-bar"></i>Nessuna statistica</div>';

  const miniRank = (title, color, rows, valFn, extraCols) => {
    if (!rows.length) return '';
    return `
      <div style="background:#0f172a;border:1px solid #1f2937;border-radius:10px;overflow:hidden;flex:1;min-width:0">
        <div style="background:#0a0f1a;padding:7px 10px;font-size:10px;font-weight:700;color:${color};letter-spacing:.06em;text-transform:uppercase;text-align:center">${title}</div>
        <table style="width:100%;font-size:11px;border-collapse:collapse">
          <thead><tr>
            <th style="padding:5px 8px;color:#4b5563;text-align:left;font-size:9px">#</th>
            <th style="padding:5px 8px;color:#4b5563;text-align:left;font-size:9px">Giocatore</th>
            <th style="padding:5px 8px;color:#4b5563;text-align:left;font-size:9px">Squadra</th>
            ${extraCols ? extraCols.map(c=>`<th style="padding:5px 8px;color:${c.color};text-align:right;font-size:9px">${c.label}</th>`).join('') : `<th style="padding:5px 8px;color:${color};text-align:right;font-size:9px">Val</th>`}
          </tr></thead>
          <tbody>${rows.map((p,i) => `
            <tr onclick="openPlayer('${p.playerId}')" style="cursor:pointer;border-top:1px solid #1a2234">
              <td style="padding:5px 8px;color:#4b5563;font-size:10px">${i+1}</td>
              <td style="padding:5px 8px"><div style="display:flex;align-items:center;gap:5px">
                ${p.photoPath ? `<img src="${imgUrl(p.photoPath)}" style="width:20px;height:20px;border-radius:50%;object-fit:cover;flex-shrink:0">` : ''}
                <span style="color:#e2e8f0;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px">${p.playerName}</span>
              </div></td>
              <td style="padding:5px 8px;color:#6b7280;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px">${p.teamName}</td>
              ${extraCols ? extraCols.map(c=>`<td style="padding:5px 8px;color:${c.color};font-weight:700;text-align:right">${c.valFn(p)||''}</td>`).join('') : `<td style="padding:5px 8px;color:${color};font-weight:700;text-align:right">${valFn(p)}</td>`}
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  };

  const top = (arr, fn) => [...arr].filter(p => fn(p) > 0).sort((a,b) => fn(b)-fn(a)).slice(0,10);

  const goals   = top(scorers, p => p.goals);
  const assists = top(scorers, p => p.assists);
  const mvp     = top(scorers, p => p.mvpCount);
  const cs      = top(scorers, p => p.cleanSheets);
  const carts   = scorers.filter(p => (p.yellowCards||0)+(p.redCards||0)>0)
                         .sort((a,b)=>((b.yellowCards||0)+(b.redCards||0)*2)-((a.yellowCards||0)+(a.redCards||0)*2)).slice(0,10);

  return `
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">

      ${miniRank('⭐ MVP',        '#a78bfa', mvp,     p=>p.mvpCount,    null)}
      ${miniRank('🧤 Clean Sheet','#34d399', cs,      p=>p.cleanSheets, null)}
      ${carts.length ? miniRank('Cartellini','#f59e0b', carts, null, [
        {label:'🟨', color:'#fbbf24', valFn: p=>p.yellowCards||0},
        {label:'🟥', color:'#f87171', valFn: p=>p.redCards||0}
      ]) : ''}

}

function renderGroupKOMatchList(groups, allMatches) {
  let html = '';

  // Gironi — raggruppati per groupIndex
  const groupMatchesByIdx = {};
  allMatches.filter(m => (m.phase||'').toLowerCase() === 'group').forEach(m => {
    const gi = m.groupIndex ?? 0;
    if (!groupMatchesByIdx[gi]) groupMatchesByIdx[gi] = [];
    groupMatchesByIdx[gi].push(m);
  });

  groups.forEach(g => {
    const gMatches = groupMatchesByIdx[g.groupIndex ?? g.GroupIndex] || [];
    if (!gMatches.length) return;
    html += `<div style="font-size:11px;font-weight:600;color:#fbbf24;text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px">${g.groupName}</div>`;
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:4px">';
    gMatches.forEach(m => { html += matchCard(m); });
    html += '</div>';
  });

  // Fase KO — divisa per matchday
  const koMatches = allMatches.filter(m => (m.phase||'').toLowerCase() !== 'group');
  if (koMatches.length) {
    const maxMd = Math.max(...koMatches.map(m => m.matchday||1));
    for (let md = 1; md <= maxMd; md++) {
      const mdM = koMatches.filter(m => (m.matchday||1) === md);
      if (!mdM.length) continue;
      html += `<div style="font-size:11px;font-weight:600;color:#fbbf24;text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px">Fase Eliminazione — Turno ${md}</div>`;
      html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:4px">';
      mdM.forEach(m => { html += matchCard(m); });
      html += '</div>';
    }
  }

  return html || '<div class="empty"><i class="ti ti-ball-football"></i>Nessuna partita</div>';
}


function matchCard(m) {
  const played = m.isPlayed ?? m.IsPlayed ?? false;
  const hw = played && m.scoreHome > m.scoreAway, aw = played && m.scoreAway > m.scoreHome;
  const score = played
    ? `<span style="font-size:15px;font-weight:700;color:#f1f5f9">${m.scoreHome} - ${m.scoreAway}</span>`
    : `<span style="font-size:15px;font-weight:500;color:#374151">-</span>`;
  return `<div style="background:#111827;border:1px solid #1f2937;border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:8px;cursor:${played?'pointer':'default'}" ${played?`onclick="openMatchDetail('${m.id}')"`:''}> 
    <div style="flex:1;display:flex;align-items:center;gap:6px;min-width:0;justify-content:flex-end">
      <span style="font-size:12px;font-weight:${hw?'700':'400'};color:${hw?'#f1f5f9':'#9ca3af'};text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.homeTeamName}</span>
      ${teamLogo(m.homeTeamLogo,20)}
    </div>
    <div style="flex-shrink:0;min-width:50px;text-align:center">${score}</div>
    <div style="flex:1;display:flex;align-items:center;gap:6px;min-width:0">
      ${teamLogo(m.awayTeamLogo,20)}
      <span style="font-size:12px;font-weight:${aw?'700':'400'};color:${aw?'#f1f5f9':'#9ca3af'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.awayTeamName}</span>
    </div>
  </div>`;
}

function renderMatchList(matches, maxMd) {
  if (!matches.length) return '<div class="empty"><i class="ti ti-ball-football"></i>Nessuna partita</div>';
  let html = '';
  for (let md = 1; md <= maxMd; md++) {
    const mdMatches = matches.filter(m => m.matchday === md);
    if (!mdMatches.length) continue;
    html += `<div style="font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px">Giornata ${md}</div>`;
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:4px">';
    mdMatches.forEach(m => { html += matchCard(m); });
    html += '</div>';
  }
  return html || '<div class="empty"><i class="ti ti-ball-football"></i>Nessuna partita</div>';
}

async function openMatchDetail(matchId) {
  const m = await api(`/api/matches/${matchId}/detail`);
  if (!m) return;
  const homePlayers = m.playerStats.filter(p => p.isHome);
  const awayPlayers = m.playerStats.filter(p => !p.isHome);

  const statSection = (label, color, players, showRating) => {
    if (!players.length) return '';
    return `
      <div style="margin-bottom:10px">
        <div style="font-size:9px;font-weight:700;color:${color};text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">${label}</div>

          <div style="display:flex;align-items:center;gap:6px;padding:2px 0;cursor:pointer" onclick="openPlayer('${p.playerId}');closeModal('match-modal')">
            ${p.photoPath ? `<img src="${imgUrl(p.photoPath)}" style="width:20px;height:20px;border-radius:50%;object-fit:cover;flex-shrink:0">` : ''}
            <span style="font-size:11px;color:#e2e8f0;flex:1">${p.playerName}</span>
            ${showRating && p.rating > 0 ? `<span style="font-size:10px;color:#94a3b8">${p.rating}</span>` : ''}
          </div>`).join('')}
      </div>`;
  };

  const teamBlock = (players) => {
    const scorers  = players.filter(p => p.goals > 0).flatMap(p => Array(p.goals).fill(p));
    const assisters= players.filter(p => p.assists > 0).flatMap(p => Array(p.assists).fill(p));
    const mvps     = players.filter(p => p.isMvp);
    const cs       = players.filter(p => p.cleanSheet);
    const carts    = players.filter(p => p.yellowCards > 0 || p.redCards > 0);
    return `
      ${statSection('⚽ Goal', '#fbbf24', scorers, false)}
      ${statSection('🅰️ Assist', '#60a5fa', assisters, false)}
      ${mvps.length ? statSection('⭐ MVP', '#a78bfa', mvps, true) : ''}
      ${cs.length ? statSection('🧤 Clean Sheet', '#34d399', cs, false) : ''}
      ${carts.length ? `
        <div style="margin-bottom:10px">
          <div style="font-size:9px;font-weight:700;color:#f59e0b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Cartellini</div>
          ${carts.map(p => `
            <div style="display:flex;align-items:center;gap:6px;padding:2px 0">
              ${p.photoPath ? `<img src="${imgUrl(p.photoPath)}" style="width:20px;height:20px;border-radius:50%;object-fit:cover;flex-shrink:0">` : ''}
              <span style="font-size:11px;color:#e2e8f0;flex:1">${p.playerName}</span>
              ${p.yellowCards ? `<div style="width:8px;height:12px;background:#fbbf24;border-radius:1px"></div>` : ''}
              ${p.redCards ? `<div style="width:8px;height:12px;background:#ef4444;border-radius:1px"></div>` : ''}
            </div>`).join('')}
        </div>` : ''}`;
  };

  document.getElementById('match-modal-body').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px">
      <div style="display:flex;align-items:center;gap:8px;flex:1">
        ${teamLogo(m.homeTeamLogo,28)}
        <span style="font-size:14px;font-weight:700;color:#f1f5f9">${m.homeTeamName}</span>
      </div>
      <div style="font-size:28px;font-weight:700;color:#f1f5f9;text-align:center;min-width:80px">${m.scoreHome} - ${m.scoreAway}</div>
      <div style="display:flex;align-items:center;gap:8px;flex:1;justify-content:flex-end">
        <span style="font-size:14px;font-weight:700;color:#f1f5f9">${m.awayTeamName}</span>
        ${teamLogo(m.awayTeamLogo,28)}
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1px 1fr;gap:0 16px">
      <div>${teamBlock(homePlayers)}</div>
      <div style="background:#1f2937"></div>
      <div>${teamBlock(awayPlayers)}</div>
    </div>`;
  document.getElementById('match-modal').style.display = 'flex';
}

  [0,1].forEach(i => {

  });
  document.querySelectorAll('#rank-subtabs button').forEach((b, i) => {
    b.style.background = i === idx ? '#1d4ed8' : '#1f2937';
    b.style.borderColor = i === idx ? '#1d4ed8' : '#374151';

    b.style.fontWeight = i === idx ? '500' : '400';
  });
}

function renderSeasonStats(data, season, leaguesSections) {
  const el = document.getElementById('ss-content');

  if (!data.isConcluded) {
    el.innerHTML = `<div class="empty"><i class="ti ti-lock"></i>Stagione ${season} non ancora conclusa</div>`;
    return;
  }

  const {bestOverall, bestScorer, bestMvp, bestGK, bestDEF, bestMID, bestFWD, merdaPOTY, xi, teamRanking, leagueRanking} = data;

  const awardCard = (label, p, icon, valStr) => {

    const pLeague = pTeam && data.leagues ? data.leagues.find(l => l.id === pTeam.leagueId) || null : null;
    const isNaz = label.toLowerCase().includes('nazliga');
    return `
    <div class="award-card" onclick="openPlayer('${p.playerId}')" style="cursor:pointer${isNaz ? ';opacity:0.88' : ''}">
      <div style="position:relative;width:120px;height:181px;margin:0 auto 10px">

      <div class="award-team">${p.teamName}</div>
      <div class="award-val" style="${isNaz ? 'color:#94a3b8' : ''}">${valStr}</div>
    </div>`;
  };

  const bestTeam   = Array.isArray(teamRanking)  && teamRanking.length  ? teamRanking[0]  : null;
  const bestLeague = Array.isArray(leagueRanking) && leagueRanking.length ? leagueRanking[0] : null;
  const fieldHtml  = renderSeasonXI(xi || []);

  el.innerHTML = `
    <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start">
      <div style="flex:1;min-width:600px">
        <!-- BEAST TEAM + CONFED -->
        <div class="grid grid-2" style="gap:12px;margin-bottom:20px">
          <div class="card" style="display:flex;align-items:center;gap:16px">
            ${bestTeam?.logoPath ? `<img src="${imgUrl(bestTeam.logoPath)}" style="width:52px;height:52px;object-fit:contain">` : ''}
            <div>
              <div style="font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Beast Team of the Season</div>
              <div style="font-size:16px;font-weight:700;color:#fbbf24">${bestTeam?.name ?? '—'}</div>
              <div style="font-size:11px;color:#6b7280">Rank: ${bestTeam?.totalScore ?? '—'}</div>
            </div>
          </div>
          <div class="card" style="display:flex;align-items:center;gap:16px">
            ${bestLeague?.logoPath ? `<img src="${imgUrl(bestLeague.logoPath)}" style="width:52px;height:52px;object-fit:contain">` : ''}
            <div>
              <div style="font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Beast Confederation of the Season</div>
              <div style="font-size:16px;font-weight:700;color:#fbbf24">${bestLeague?.name ?? '—'}</div>
              <div style="font-size:11px;color:#6b7280">Rank: ${bestLeague?.totalScore ?? '—'}</div>
            </div>
          </div>
        </div>
        <!-- MERDA POTY + BEAST MERDA + BEST SCORER -->
        <div class="grid grid-3" style="gap:12px;margin-bottom:20px">
          ${awardCard('Merda Player of the Year', merdaPOTY, data.merdaPOTYIcon, `MVP: ${merdaPOTY?.mvpCount ?? 0} · Avg: ${fmtR(merdaPOTY?.avgRating)} · Rank: ${merdaPOTY?.totalScore ?? 0}`)}
          ${awardCard('Beast Merda Player', bestOverall, data.beastMerdaIcon, `Rank: ${bestOverall?.totalScore ?? 0}`)}
          ${awardCard('Best Merda Scorer', bestScorer, data.bestScorerIcon, `Gol: ${bestScorer?.goals ?? 0}`)}
        </div>
        <!-- GK DEF MID FWD -->
        <div class="grid grid-4" style="gap:12px;margin-bottom:20px">
          ${awardCard('Beast Goalkeeper', bestGK, data.bestRoleIcon, `CS: ${bestGK?.cleanSheets ?? 0} · Rank: ${bestGK?.totalScore ?? 0}`)}
          ${awardCard('Beast Defender',   bestDEF, data.bestRoleIcon, `Rank: ${bestDEF?.totalScore ?? 0}`)}
          ${awardCard('Beast Midfielder', bestMID, data.bestRoleIcon, `Rank: ${bestMID?.totalScore ?? 0}`)}
          ${awardCard('Beast Forward',    bestFWD, data.bestRoleIcon, `Gol: ${bestFWD?.goals ?? 0} · Rank: ${bestFWD?.totalScore ?? 0}`)}
        </div>
        <!-- BEAST NAZLIGA PLAYER + BEST NAZLIGA SCORER -->
        ${(data.bestNazligaPlayer || data.bestNazligaScorer) ? ('<div class="grid grid-2" style="gap:12px;margin-bottom:20px">' +
          awardCard('Beast Nazliga Player', data.bestNazligaPlayer, data.beastNazligaPlayerIcon, 'Rank: ' + (data.bestNazligaPlayer?.totalScore ?? 0)) +
          awardCard('Best Nazliga Scorer',  data.bestNazligaScorer,  data.bestNazligaScorerIcon,  'Gol: '  + (data.bestNazligaScorer?.goals ?? 0)) +
          '</div>') : ''}

      <!-- XI SU CAMPO -->
      <div style="width:300px;flex-shrink:0">
        <div class="section-hdr"><h2>Team of the Season</h2></div>

    <!-- SEZIONE LEGHE -->

    <div id="season-leagues">

function renderLeagueSection(lg) {
  const catIcon = { goals:'⚽', assists:'🅰️', mvp:'⭐', clean:'🧤' };
  const catLabel = { goals:'Capocannoniere', assists:'Assist leader', mvp:'MVP', clean:'Clean Sheet' };

  const compBlock = (comp, title) => {
    if (!comp) return '';
    const playerRows = renderPlayerTrophyRow(comp.playerTrophies || []);
    return `
      <div style="flex:1;min-width:200px;border-right:1px solid #1f2937;padding:0 16px">
        <div style="font-size:10px;font-weight:700;color:#fbbf24;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;text-align:center">${title}</div>
        <!-- Logo torneo + vincitore -->
        <div style="display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:12px">
          <div style="display:flex;align-items:center;gap:10px;justify-content:center">
            ${comp.tournamentLogo ? `<img src="${imgUrl(comp.tournamentLogo)}" style="width:36px;height:36px;object-fit:contain">` : ''}
            ${comp.winnerLogo ? `<img src="${imgUrl(comp.winnerLogo)}" style="width:48px;height:48px;object-fit:contain;border-radius:50%">` : ''}
            ${comp.trophyIcon ? `<img src="${imgUrl(comp.trophyIcon)}" style="width:36px;height:36px;object-fit:contain">` : ''}
          </div>
          <div style="font-size:13px;font-weight:600;color:#f1f5f9;text-align:center">${comp.winnerName ?? '—'}</div>
        </div>
        <!-- Trofei individuali -->
        ${playerRows}
      </div>`;
  };

  return `
    <div style="background:#111827;border:1px solid #1f2937;border-radius:12px;margin-bottom:16px;overflow:hidden">
      <!-- Header lega -->
      <div style="background:#0f172a;padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #1f2937">
        ${lg.leagueLogo ? `<img src="${imgUrl(lg.leagueLogo)}" style="width:28px;height:28px;object-fit:contain">` : ''}
        <span style="font-size:13px;font-weight:700;color:#fbbf24;letter-spacing:.06em;text-transform:uppercase">${lg.leagueName}</span>
      </div>
      <!-- Competizioni -->
      <div style="display:flex;padding:16px;gap:0;flex-wrap:wrap">
        ${compBlock(lg.campionato,  'Campionato')}
        ${compBlock(lg.coppa,       'Coppa')}
        ${lg.superlega ? compBlock(lg.superlega, 'Superlega') : ''}
        ${compBlock(lg.supercoppa,  'Supercoppa')}
      </div>
    </div>`;
}

function renderPlayerTrophyRow(playerTrophies) {
  if (!playerTrophies || playerTrophies.length === 0) return '';
  const catIcon  = { goals:'⚽', assists:'🅰️', mvp:'⭐', clean:'🧤' };
  const catLabel = { goals:'Gol', assists:'Assist', mvp:'MVP', clean:'CS' };
  const order    = ['goals','assists','mvp','clean'];

  return order.map(cat => {
    const trophy = playerTrophies.find(t => t.category === cat);
    if (!trophy || !trophy.players?.length) return '';
    const p = trophy.players[0];
    return `
      <div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-top:1px solid #1a2234">
        <div style="display:flex;align-items:center;gap:4px;min-width:60px">
          ${trophy.iconPath ? `<img src="${imgUrl(trophy.iconPath)}" style="width:20px;height:20px;object-fit:contain">` : `<span style="font-size:14px">${catIcon[cat]||'🏆'}</span>`}
          <span style="font-size:9px;color:#6b7280;text-transform:uppercase;font-weight:600">${catLabel[cat]||cat}</span>
        </div>
        <img src="${imgUrl(p.photoPath)}" style="width:24px;height:24px;border-radius:50%;object-fit:cover;background:#1f2937;flex-shrink:0" onerror="this.style.display='none'">
        <div style="min-width:0">
          <div style="font-size:11px;font-weight:600;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" onclick="openPlayer('${p.playerId}')" style="cursor:pointer">${p.playerName}</div>
          <div style="font-size:10px;color:#6b7280;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.teamName}</div>
        </div>
        ${trophy.players.length > 1 ? `<span style="font-size:10px;color:#4b5563">+${trophy.players.length-1}</span>` : ''}
      </div>`;
  }).join('');
}

function renderSeasonXI(xi) {
  if (!xi || xi.length === 0) return '<div class="empty"><i class="ti ti-run"></i>Dati insufficienti</div>';

  const byPos = { GK: xi.filter(p=>p.position==='GK'), DEF: xi.filter(p=>p.position==='DEF'), MID: xi.filter(p=>p.position==='MID'), FWD: xi.filter(p=>p.position==='FWD') };

  const row = (players, label) => `
    <div style="display:flex;justify-content:center;gap:8px;margin-bottom:12px">
      ${players.map(p => `
        <div style="text-align:center;cursor:pointer;width:64px" onclick="openPlayer('${p.playerId}')">
          <img src="${imgUrl(p.photoPath)}" style="width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.3);background:#1f2937;display:block;margin:0 auto 4px" onerror="this.src=''">
          <div style="font-size:9px;font-weight:600;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.9);background:rgba(0,0,0,.5);border-radius:3px;padding:1px 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:64px">${p.playerName}</div>
          <div style="font-size:8px;color:rgba(255,255,255,.6)">${fmtR(p.avgRating)}</div>
        </div>`).join('')}
    </div>`;

  return `
    <div style="background:linear-gradient(180deg,#064e3b 0%,#065f46 50%,#064e3b 100%);border-radius:10px;padding:16px 8px;position:relative;min-height:420px">
      <!-- linee campo -->
      <div style="position:absolute;top:50%;left:10%;right:10%;height:1px;background:rgba(255,255,255,.15)"></div>
      <div style="position:absolute;top:10%;left:25%;right:25%;height:18%;border:1px solid rgba(255,255,255,.15);border-top:none"></div>
      <div style="position:absolute;bottom:10%;left:25%;right:25%;height:18%;border:1px solid rgba(255,255,255,.15);border-bottom:none"></div>
      <div style="position:relative;z-index:10;padding-top:8px">
        ${row(byPos.FWD, 'ATT')}
        ${row(byPos.MID, 'CEN')}
        ${row(byPos.DEF, 'DIF')}
        ${row(byPos.GK,  'POR')}
      </div>
    </div>`;
}

// Costruisce la tabella palmares con colonne per tipo di competizione
function buildPalmaresTable(palmares, byType, headerIcon, headerTitle, totalEditions) {
  if (!palmares.length) return '';
  // Colonne = tipi di competizione presenti
  const cols = (byType||[]).map(c => ({ label: c.label, icon: c.sectionIcon || null }));
  // Per ogni squadra: quante vittorie per tipo
  const edsByType = {};
  (byType||[]).forEach(cat => {
    cat.editions.forEach(e => {
      if (!edsByType[cat.label]) edsByType[cat.label] = {};
      edsByType[cat.label][e.teamName] = (edsByType[cat.label][e.teamName]||0) + 1;
    });
  });

  const thCols = cols.map(c => `<th style="text-align:center;padding:5px 8px">
    ${c.icon ? `<img src="${imgUrl(c.icon)}" style="width:20px;height:20px;object-fit:contain;filter:drop-shadow(0 1px 3px rgba(0,0,0,.8))">` : c.label}
  </th>`).join('');

  const rows = palmares.map((p,i) => {
    const tdCols = cols.map(c => {
      const n = edsByType[c.label]?.[p.teamName] || 0;
      return `<td style="text-align:center;padding:5px 8px;font-weight:700;color:${n>0?'#fbbf24':'#374151'}">${n>0?n:'—'}</td>`;
    }).join('');
    const rankColor = i===0?'#fbbf24':i===1?'#9ca3af':i===2?'#b45309':'#4b5563';
    return `<tr>
      <td style="padding:5px 8px;color:${rankColor};font-weight:700">${i+1}</td>
      <td style="padding:5px 8px">
        <div style="display:flex;align-items:center;gap:8px">
          ${p.teamLogo ? `<img src="${imgUrl(p.teamLogo)}" style="width:22px;height:22px;object-fit:contain;flex-shrink:0">` : ''}
          <span style="font-weight:600;font-size:12px;color:#e2e8f0">${p.teamName}</span>
        </div>
      </td>
      ${tdCols}
      <td style="padding:5px 8px;text-align:center;font-weight:700;color:#fbbf24">${p.count}</td>
    </tr>`;
  }).join('');

  const thTotal = `<th style="text-align:center;padding:5px 8px;color:#fbbf24">TOT</th>`;

  return `
    <div style="margin-bottom:24px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <span style="font-size:13px;font-weight:700;color:#f1f5f9">Palmares</span>
        <span class="count">${totalEditions}</span>
      </div>
      <div class="table-wrap" style="max-width:600px">
        <table style="font-size:12px">
          <thead><tr>
            <th style="padding:5px 8px">#</th>
            <th style="padding:5px 8px">Squadra</th>
            ${thCols}
            ${thTotal}
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

// Renderizza una singola competizione — logo torneo + griglia vincitori con loghi GRANDI
function renderTrophyCompetition(label, editions, _unused, sectionIcon, sectionTournamentLogo) {
  if (!editions || !editions.length) return '';

  // Icona sopra: logo torneo
  const displayIcon = sectionTournamentLogo || sectionIcon || editions[0]?.iconPath || null;

  // Cards vincitori con logo squadra grande
  const cards = editions.map(e => `
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;min-width:80px;max-width:100px">
      <div style="font-size:10px;font-weight:700;color:#fbbf24">${e.season}</div>
      <div style="width:96px;height:96px;border-radius:12px;background:#0f172a;border:1px solid #1f2937;display:flex;align-items:center;justify-content:center;padding:8px">
        ${e.teamLogo
          ? `<img src="${imgUrl(e.teamLogo)}" style="width:100%;height:100%;object-fit:contain">`
          : `<div style="color:#4b5563;font-size:10px;text-align:center">${e.teamName}</div>`}
      </div>
      <div style="font-size:10px;color:#e2e8f0;font-weight:600;text-align:center;max-width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.teamName}</div>
    </div>`).join('');

  return `
    <div style="margin-bottom:24px;background:#0d1117;border:1px solid #1f2937;border-radius:10px;padding:16px">
      <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:14px">
        ${displayIcon ? `<img src="${imgUrl(displayIcon)}" style="width:40px;height:40px;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,.8));margin-bottom:6px">` : ''}
        <div style="font-size:11px;font-weight:700;color:#fbbf24;letter-spacing:.1em;text-transform:uppercase">${label}</div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:14px;justify-content:center">${cards}</div>
    </div>`;
}

// Renderizza gruppi di trofei individuali (MERDA o lega reale)
function renderPlayerTrophyGroups(groups, headerLogo, headerName, leagueId) {
  const el = document.getElementById('playertrophies-content');
  if (!groups || !groups.length) {
    el.innerHTML = '<div class="empty"><i class="ti ti-award"></i>Nessun trofeo individuale trovato</div>';
    return;
  }

  const headerHtml = `
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
      ${headerLogo ? `<img src="${imgUrl(headerLogo)}" style="width:52px;height:52px;object-fit:contain">` : ''}

    </div>`;

  const groupsHtml = groups.map(g => renderPlayerTrophyGroup(g)).join('');
  el.innerHTML = headerHtml + groupsHtml;
}

// Un gruppo = una competizione (es. CAMPIONATO, COPPA, Merda Championship...)
function renderPlayerTrophyGroup(g) {
  const cats = (g.categories || []);
  if (!cats.length) return '';

  // Logo della competizione: prende il TournamentLogo dalla prima categoria
  const groupIcon = cats[0]?.tournamentLogo || cats[0]?.iconPath || null;

  const catsHtml = cats.map(cat => renderPlayerTrophyCategory(cat)).join('');

  return `
    <div style="margin-bottom:32px;background:#0d1117;border:1px solid #1f2937;border-radius:12px;padding:20px">
      <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:18px">
        ${groupIcon ? `<img src="${imgUrl(groupIcon)}" style="width:48px;height:48px;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,.8));margin-bottom:8px">` : ''}
        <div style="font-size:12px;font-weight:700;color:#fbbf24;letter-spacing:.1em;text-transform:uppercase">${g.groupName}</div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:16px;justify-content:center">${catsHtml}</div>
    </div>`;
}

// Una categoria = Capocannoniere / Assist / MVP / Clean Sheet
// Layout: colonna verticale — una riga per stagione, foto tonde giocatori sulla destra
function renderPlayerTrophyCategory(cat) {
  const seasons = cat.winnersBySeason || [];
  if (!seasons.length) return '';

  const rows = seasons.map(s => {
    const playerImgs = (s.players || []).map(w => `
      <div style="display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer" onclick="openPlayer('${w.playerId}')">
        ${w.photoPath
          ? `<img src="${imgUrl(w.photoPath)}" style="width:52px;height:52px;border-radius:50%;object-fit:cover;object-position:top center;border:2px solid ${cat.color};transition:transform .15s" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">`
          : `<div style="width:52px;height:52px;border-radius:50%;background:#1f2937;border:2px solid ${cat.color};display:flex;align-items:center;justify-content:center"><i class="ti ti-user" style="font-size:22px;color:#4b5563"></i></div>`}
        <div style="font-size:8px;font-weight:700;color:#e2e8f0;text-align:center;max-width:58px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${w.playerName}</div>
      </div>`).join('');

    return `
      <div style="display:flex;align-items:center;gap:12px;padding:6px 0;border-bottom:1px solid #1a2234">
        <div style="font-size:10px;font-weight:700;color:#fbbf24;min-width:32px;flex-shrink:0">${s.season}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">${playerImgs}</div>
      </div>`;
  }).join('');

  return `
    <div style="background:#111827;border:1px solid #1f2937;border-radius:10px;padding:14px;min-width:180px">
      <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:12px">
        ${cat.iconPath ? `<img src="${imgUrl(cat.iconPath)}" style="width:32px;height:32px;object-fit:contain;filter:drop-shadow(0 2px 4px rgba(0,0,0,.8));margin-bottom:4px">` : ''}
        <div style="font-size:10px;font-weight:700;color:${cat.color};letter-spacing:.08em;text-transform:uppercase">${cat.label}</div>
      </div>
      <div>${rows}</div>
    </div>`;
}


// ─── RELOAD ──────────────────────────────────────────────────────────────────
async function reloadData() {
  const icon = document.getElementById('reload-icon');
  icon.style.animation = 'spin 1s linear infinite';
  try {
    const res = await fetch('/api/reload', { method: 'POST' });
    const data = await res.json();
    // Ricarica tutto
    state.leagues = await api('/api/leagues');
    state.tournaments = await api('/api/tournaments');
    buildSidebar(state.tab);
    // Aggiorna stagioni
    const seasons = await api('/api/seasons');
    const gSel = document.getElementById('global-season');
    const psSel = document.getElementById('ps-season');
    const ssSel = document.getElementById('ss-season');
    [gSel, psSel].forEach(sel => { while(sel.options.length > 1) sel.remove(1); });
    while(ssSel.options.length > 1) ssSel.remove(1);
    seasons.forEach(s => {
      [gSel, psSel].forEach(sel => sel.appendChild(new Option(s.name, s.name)));
      ssSel.appendChild(new Option(s.name, s.name));
    });
    // Pre-seleziona l'ultima stagione conclusa
    const lastConcluded2 = seasons.find(s => s.isConcluded);
    if (lastConcluded2) {
      ssSel.value = lastConcluded2.name;
      loadSeasonStats(lastConcluded2.name);
    }
    console.log(`[Reload] Leghe:${data.leagues} Squadre:${data.teams} Giocatori:${data.players} Partite:${data.matches}`);
  } catch(e) {
    console.error('Reload error:', e);
  } finally {
    icon.style.animation = '';
  }
}
